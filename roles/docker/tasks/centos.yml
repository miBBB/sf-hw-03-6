- name: Install required packages - CentOS
  ansible.builtin.yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: latest
    update_cache: true

#- name: Add Docker gpg key - CentOS
#  ansible.builtin.rpm_key:
#    state: present
#    key: https://download.docker.com

- name: Add docker repository - CentOS
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'

- name: Install docker - CentOS
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: latest

- name: Add group docker - CentOS
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to group docker - CentOS
  ansible.builtin.user:
    name: test
    groups: docker
    append: true

- name: Run docker - CentOS
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
