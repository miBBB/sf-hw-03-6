---
#- name: ubuntu
#  tasks:
#gather_facts: yes
- name: Remove old version - Ubuntu
  apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
  ignore_errors: True

- name: Update apt packages cache - Ubuntu
  apt:
    update_cache: yes

- name: Upgrade packeges - Ubuntu
  apt:
    upgrade: dist
    autoremove: yes

- name: Install dependency - Ubuntu
  apt:
    name:
      - ca-certificates
      - curl
    state: present

- name: Add gpg key - Ubuntu
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc

- name: add repository - Ubuntu
  ansible.builtin.copy:
    dest: "/etc/apt/sources.list.d/docker.sources"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Update apt packages cache - Ubuntu
  apt:
    update_cache: yes

- name: Install docker - Ubuntu
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Add group docker - Ubuntu
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to group docker - Ubuntu
  ansible.builtin.user:
    name: test
    groups: docker
    append: true

- name: Start docker daemon - Ubuntu
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
